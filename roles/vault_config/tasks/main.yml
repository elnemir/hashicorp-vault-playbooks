- name: Ensure Vault config and TLS directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/vault.d", owner: "vault", group: "vault", mode: "0750" }
    - { path: "/etc/vault.d/tls", owner: "vault", group: "vault", mode: "0750" }

- name: Validate TLS controller mode
  ansible.builtin.assert:
    that:
      - vault_tls_controller_mode in ["split", "bundle"]
    fail_msg: "vault_tls_controller_mode must be either 'split' or 'bundle'."
  when: vault_tls_deploy_from_controller | bool

- name: Check local bundle TLS file on controller
  ansible.builtin.stat:
    path: "{{ vault_tls_controller_bundle_file }}"
  delegate_to: localhost
  become: false
  register: vault_tls_bundle_local_stat
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "bundle"

- name: Fail when local bundle TLS file is missing
  ansible.builtin.assert:
    that:
      - vault_tls_bundle_local_stat.stat.exists | bool
    fail_msg: "TLS bundle file not found on controller: {{ vault_tls_controller_bundle_file }}"
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "bundle"

- name: Check local split TLS files on controller
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop:
    - { path: "{{ vault_tls_controller_cert_file }}" }
    - { path: "{{ vault_tls_controller_key_file }}" }
    - { path: "{{ vault_tls_controller_ca_file }}" }
  delegate_to: localhost
  become: false
  register: vault_tls_split_local_stats
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "split"

- name: Fail when one or more local split TLS files are missing
  ansible.builtin.assert:
    that:
      - "(vault_tls_split_local_stats.results | map(attribute='stat.exists') | list | min) | bool"
    fail_msg: >-
      Split TLS files are missing on controller. Required:
      {{ vault_tls_controller_cert_file }}, {{ vault_tls_controller_key_file }}, {{ vault_tls_controller_ca_file }}
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "split"

- name: Deploy TLS cert/key/ca from bundle file
  ansible.builtin.copy:
    src: "{{ vault_tls_controller_bundle_file }}"
    dest: "{{ item.dest }}"
    owner: vault
    group: vault
    mode: "{{ item.mode }}"
  loop:
    - { dest: "{{ vault_tls_cert_file }}", mode: "0640" }
    - { dest: "{{ vault_tls_key_file }}", mode: "0600" }
  no_log: true
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "bundle"

- name: Deploy CA from bundle file when enabled
  ansible.builtin.copy:
    src: "{{ vault_tls_controller_bundle_file }}"
    dest: "{{ vault_tls_ca_file }}"
    owner: vault
    group: vault
    mode: "0640"
  no_log: true
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "bundle"
    - vault_tls_controller_bundle_as_ca | bool

- name: Deploy split TLS files from controller
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: vault
    group: vault
    mode: "{{ item.mode }}"
  loop:
    - { src: "{{ vault_tls_controller_cert_file }}", dest: "{{ vault_tls_cert_file }}", mode: "0640" }
    - { src: "{{ vault_tls_controller_key_file }}", dest: "{{ vault_tls_key_file }}", mode: "0600" }
    - { src: "{{ vault_tls_controller_ca_file }}", dest: "{{ vault_tls_ca_file }}", mode: "0640" }
  no_log: true
  when:
    - vault_tls_deploy_from_controller | bool
    - vault_tls_controller_mode == "split"

- name: Check required TLS artifacts
  ansible.builtin.stat:
    path: "{{ item.path }}"
  loop:
    - { path: "{{ vault_tls_cert_file }}" }
    - { path: "{{ vault_tls_key_file }}" }
    - { path: "{{ vault_tls_ca_file }}" }
  register: vault_tls_artifacts
  when: vault_require_tls_files | bool

- name: Fail when TLS artifacts are missing
  ansible.builtin.assert:
    that:
      - "(vault_tls_artifacts.results | map(attribute='stat.exists') | list | min) | bool"
    fail_msg: >-
      Missing TLS artifacts for Vault. Ensure cert/key/CA files are delivered before role execution:
      {{ vault_tls_cert_file }}, {{ vault_tls_key_file }}, {{ vault_tls_ca_file }}.
  when: vault_require_tls_files | bool

- name: Enforce TLS artifact permissions
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: vault
    group: vault
    mode: "{{ item.mode }}"
    state: file
  loop:
    - { path: "{{ vault_tls_cert_file }}", mode: "0640" }
    - { path: "{{ vault_tls_key_file }}", mode: "0600" }
    - { path: "{{ vault_tls_ca_file }}", mode: "0640" }
  when: vault_require_tls_files | bool

- name: Initialize effective RAFT retry_join list
  ansible.builtin.set_fact:
    vault_effective_retry_join: []
  when: vault_raft_retry_join | length == 0

- name: Build default RAFT retry_join list from inventory
  ansible.builtin.set_fact:
    vault_effective_retry_join: "{{ (vault_effective_retry_join | default([])) + [ {'leader_api_addr': 'https://' ~ (hostvars[item].ansible_host | default(item)) ~ ':8200'} ] }}"
  loop: "{{ groups['vault'] | default([]) }}"
  when:
    - item != inventory_hostname
    - vault_raft_retry_join | length == 0

- name: Prefer explicitly provided retry_join list when present
  ansible.builtin.set_fact:
    vault_effective_retry_join: "{{ vault_raft_retry_join }}"
  when: vault_raft_retry_join | length > 0

- name: Initialize cluster firewall source list from inventory
  ansible.builtin.set_fact:
    vault_effective_cluster_source_cidrs: []
  when: vault_config_cluster_source_cidrs | length == 0

- name: Build cluster firewall source list from vault nodes
  ansible.builtin.set_fact:
    vault_effective_cluster_source_cidrs: "{{ (vault_effective_cluster_source_cidrs | default([])) + [ (hostvars[item].ansible_host | default(item)) ~ '/32' ] }}"
  loop: "{{ groups['vault'] | default([]) }}"
  when:
    - vault_config_cluster_source_cidrs | length == 0

- name: Prefer explicitly provided cluster firewall source list
  ansible.builtin.set_fact:
    vault_effective_cluster_source_cidrs: "{{ vault_config_cluster_source_cidrs }}"
  when: vault_config_cluster_source_cidrs | length > 0

- name: Set effective API firewall source list
  ansible.builtin.set_fact:
    vault_effective_api_source_cidrs: "{{ vault_config_api_source_cidrs }}"

- name: Validate strict firewall requirements for API sources
  ansible.builtin.assert:
    that:
      - vault_effective_api_source_cidrs | length > 0
    fail_msg: "vault_config_firewall_strict=true requires non-empty vault_config_api_source_cidrs."
  when:
    - vault_manage_firewalld | bool
    - vault_config_firewall_strict | bool

- name: Validate strict firewall requirements for cluster sources
  ansible.builtin.assert:
    that:
      - vault_effective_cluster_source_cidrs | length > 0
    fail_msg: "vault_config_firewall_strict=true requires non-empty vault_effective_cluster_source_cidrs."
  when:
    - vault_manage_firewalld | bool
    - vault_config_firewall_strict | bool

- name: Deploy Vault configuration
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_file }}"
    owner: vault
    group: vault
    mode: "0640"
  notify: Restart vault

- name: Allow Vault API access from approved CIDRs
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - "--add-rich-rule=rule family=ipv4 source address={{ item }} port protocol=tcp port=8200 accept"
  loop: "{{ vault_effective_api_source_cidrs }}"
  register: firewalld_add_api_cidr_rules
  changed_when: "'success' in (firewalld_add_api_cidr_rules.stdout + firewalld_add_api_cidr_rules.stderr)"
  failed_when:
    - firewalld_add_api_cidr_rules.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_api_cidr_rules.stdout + firewalld_add_api_cidr_rules.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_effective_api_source_cidrs | length > 0
  notify: Reload firewalld

- name: Allow Vault cluster traffic only from cluster nodes
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - "--add-rich-rule=rule family=ipv4 source address={{ item }} port protocol=tcp port=8201 accept"
  loop: "{{ vault_effective_cluster_source_cidrs }}"
  register: firewalld_add_cluster_cidr_rules
  changed_when: "'success' in (firewalld_add_cluster_cidr_rules.stdout + firewalld_add_cluster_cidr_rules.stderr)"
  failed_when:
    - firewalld_add_cluster_cidr_rules.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_cluster_cidr_rules.stdout + firewalld_add_cluster_cidr_rules.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_effective_cluster_source_cidrs | length > 0
  notify: Reload firewalld

- name: Fallback - allow Vault API port globally when CIDR restrictions are absent
  ansible.builtin.command: firewall-cmd --permanent --add-port=8200/tcp
  register: firewalld_add_api_port
  changed_when: "'success' in (firewalld_add_api_port.stdout + firewalld_add_api_port.stderr)"
  failed_when:
    - firewalld_add_api_port.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_api_port.stdout + firewalld_add_api_port.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_effective_api_source_cidrs | length == 0
    - not vault_config_firewall_strict | bool
  notify: Reload firewalld

- name: Fallback - allow Vault cluster port globally when source list is absent
  ansible.builtin.command: firewall-cmd --permanent --add-port=8201/tcp
  register: firewalld_add_cluster_port
  changed_when: "'success' in (firewalld_add_cluster_port.stdout + firewalld_add_cluster_port.stderr)"
  failed_when:
    - firewalld_add_cluster_port.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_cluster_port.stdout + firewalld_add_cluster_port.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_effective_cluster_source_cidrs | length == 0
    - not vault_config_firewall_strict | bool
  notify: Reload firewalld

- name: Remove generic Vault API port rule in strict mode
  ansible.builtin.command: firewall-cmd --permanent --remove-port=8200/tcp
  register: firewalld_remove_api_port
  changed_when: "'success' in (firewalld_remove_api_port.stdout + firewalld_remove_api_port.stderr)"
  failed_when:
    - firewalld_remove_api_port.rc != 0
    - "'NOT_ENABLED' not in (firewalld_remove_api_port.stdout + firewalld_remove_api_port.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_config_firewall_strict | bool
  notify: Reload firewalld

- name: Remove generic Vault cluster port rule in strict mode
  ansible.builtin.command: firewall-cmd --permanent --remove-port=8201/tcp
  register: firewalld_remove_cluster_port
  changed_when: "'success' in (firewalld_remove_cluster_port.stdout + firewalld_remove_cluster_port.stderr)"
  failed_when:
    - firewalld_remove_cluster_port.rc != 0
    - "'NOT_ENABLED' not in (firewalld_remove_cluster_port.stdout + firewalld_remove_cluster_port.stderr)"
  when:
    - vault_manage_firewalld | bool
    - vault_config_firewall_strict | bool
  notify: Reload firewalld

- name: Ensure Vault service is enabled and running
  ansible.builtin.systemd:
    name: "{{ vault_service_name }}"
    enabled: true
    state: started

- name: Validate Vault service status via CLI
  ansible.builtin.command: "{{ vault_bin_path }} status -format=json"
  environment:
    VAULT_ADDR: "{{ vault_api_addr }}"
    VAULT_CACERT: "{{ vault_tls_ca_file }}"
  register: vault_postcheck_status
  changed_when: false
  failed_when: vault_postcheck_status.rc not in [0, 2]
  when: vault_config_postcheck_enabled | bool

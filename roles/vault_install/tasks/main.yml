- name: Ensure Vault group exists
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true

- name: Ensure Vault user exists
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Ensure Vault directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vault_config_dir }}", owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: "0750" }
    - { path: "{{ vault_data_dir }}", owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: "0750" }
    - { path: "{{ vault_log_dir }}", owner: "{{ vault_user }}", group: "{{ vault_group }}", mode: "0750" }

- name: Download Vault archive
  ansible.builtin.get_url:
    url: "{{ vault_download_url }}"
    dest: "{{ vault_archive_path }}"
    mode: "0644"
    force: false
    checksum: "{{ vault_download_checksum if (vault_download_checksum | length > 0) else omit }}"

- name: Create temporary extraction directory
  ansible.builtin.tempfile:
    state: directory
    suffix: vault
  register: vault_tmp_extract

- name: Extract Vault archive
  ansible.builtin.unarchive:
    src: "{{ vault_archive_path }}"
    dest: "{{ vault_tmp_extract.path }}"
    remote_src: true

- name: Install Vault binary
  ansible.builtin.copy:
    src: "{{ vault_tmp_extract.path }}/vault"
    dest: "{{ vault_bin_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart vault

- name: Deploy Vault systemd unit
  ansible.builtin.template:
    src: vault.service.j2
    dest: "{{ vault_systemd_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart vault

- name: Remove temporary extraction directory
  ansible.builtin.file:
    path: "{{ vault_tmp_extract.path }}"
    state: absent

- name: Remove Vault archive from temporary location
  ansible.builtin.file:
    path: "{{ vault_archive_path }}"
    state: absent

- name: Ensure Vault service is enabled but not started before configuration
  ansible.builtin.systemd:
    name: "{{ vault_service_name }}"
    enabled: true
    daemon_reload: true
    state: stopped

vault_version: "1.16.2"
vault_arch: amd64
vault_download_url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_{{ vault_arch }}.zip"
vault_download_checksum: ""
vault_archive_path: "/tmp/vault_{{ vault_version }}_linux_{{ vault_arch }}.zip"
vault_remove_archive_after_install: false
vault_user: vault
vault_group: vault
vault_config_dir: /etc/vault.d
vault_data_dir: /opt/vault
vault_log_dir: /var/log/vault
vault_bin_path: /usr/local/bin/vault
vault_service_name: vault
vault_systemd_unit_path: /etc/systemd/system/vault.service

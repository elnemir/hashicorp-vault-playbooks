- name: Skip bootstrap when disabled
  ansible.builtin.debug:
    msg: "vault_bootstrap_enabled=false, bootstrap flow skipped."
  when: not vault_bootstrap_enabled | bool

- name: Collect Vault status
  ansible.builtin.command: "{{ vault_bin_path }} status -format=json"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
  register: vault_status_initial
  changed_when: false
  failed_when: vault_status_initial.rc not in [0, 2]
  when: vault_bootstrap_enabled | bool

- name: Parse Vault initial status payload
  ansible.builtin.set_fact:
    vault_status_json: "{{ vault_status_initial.stdout | from_json }}"
    vault_initialized: "{{ (vault_status_initial.stdout | from_json).initialized | default(false) }}"
    vault_sealed: "{{ (vault_status_initial.stdout | from_json).sealed | default(true) }}"
  when: vault_bootstrap_enabled | bool

- name: Stop when manual initialization is required
  ansible.builtin.fail:
    msg: >-
      Vault is not initialized. Set vault_bootstrap_auto_init=true only for controlled one-time bootstrap,
      or initialize manually with approved security process.
  when:
    - vault_bootstrap_enabled | bool
    - not vault_initialized | bool
    - not vault_bootstrap_auto_init | bool

- name: Initialize Vault in controlled mode
  ansible.builtin.command: >-
    {{ vault_bin_path }} operator init -format=json
    -key-shares={{ vault_key_shares }}
    -key-threshold={{ vault_key_threshold }}
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
  register: vault_init_payload
  changed_when: true
  no_log: true
  when:
    - vault_bootstrap_enabled | bool
    - not vault_initialized | bool
    - vault_bootstrap_auto_init | bool

- name: Store initialization payload on target node
  ansible.builtin.copy:
    content: "{{ vault_init_payload.stdout }}"
    dest: "{{ vault_init_output_path }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - vault_bootstrap_enabled | bool
    - not vault_initialized | bool
    - vault_bootstrap_auto_init | bool

- name: Collect Vault status after optional initialization
  ansible.builtin.command: "{{ vault_bin_path }} status -format=json"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
  register: vault_status_after_init
  changed_when: false
  failed_when: vault_status_after_init.rc not in [0, 2]
  when: vault_bootstrap_enabled | bool

- name: Parse Vault status after optional initialization
  ansible.builtin.set_fact:
    vault_status_json: "{{ vault_status_after_init.stdout | from_json }}"
    vault_initialized: "{{ (vault_status_after_init.stdout | from_json).initialized | default(false) }}"
    vault_sealed: "{{ (vault_status_after_init.stdout | from_json).sealed | default(true) }}"
  when: vault_bootstrap_enabled | bool

- name: Unseal Vault when unseal keys are provided
  ansible.builtin.command: "{{ vault_bin_path }} operator unseal {{ item }}"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
  loop: "{{ vault_bootstrap_unseal_keys[:vault_key_threshold] }}"
  register: vault_unseal_result
  changed_when: true
  no_log: true
  when:
    - vault_bootstrap_enabled | bool
    - vault_sealed | bool
    - vault_bootstrap_unseal_keys | length >= vault_key_threshold

- name: Collect Vault status after optional unseal
  ansible.builtin.command: "{{ vault_bin_path }} status -format=json"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
  register: vault_status_after_unseal
  changed_when: false
  failed_when: vault_status_after_unseal.rc not in [0, 2]
  when: vault_bootstrap_enabled | bool

- name: Parse Vault status after optional unseal
  ansible.builtin.set_fact:
    vault_status_json: "{{ vault_status_after_unseal.stdout | from_json }}"
    vault_initialized: "{{ (vault_status_after_unseal.stdout | from_json).initialized | default(false) }}"
    vault_sealed: "{{ (vault_status_after_unseal.stdout | from_json).sealed | default(true) }}"
  when: vault_bootstrap_enabled | bool

- name: Ensure audit log directory exists
  ansible.builtin.file:
    path: "{{ vault_bootstrap_audit_file_path | dirname }}"
    state: directory
    owner: vault
    group: vault
    mode: "0750"
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - vault_bootstrap_manage_audit_file | bool

- name: Ensure audit log file exists
  ansible.builtin.file:
    path: "{{ vault_bootstrap_audit_file_path }}"
    state: touch
    owner: vault
    group: vault
    mode: "0640"
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - vault_bootstrap_manage_audit_file | bool

- name: Fail when audit enable is requested but root token is absent
  ansible.builtin.fail:
    msg: "vault_bootstrap_root_token must be provided to enable audit device."
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - not vault_sealed | bool
    - vault_bootstrap_root_token | length == 0

- name: Collect Vault audit devices
  ansible.builtin.command: "{{ vault_bin_path }} audit list -format=json"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
    VAULT_TOKEN: "{{ vault_bootstrap_root_token }}"
  register: vault_audit_list_raw
  changed_when: false
  no_log: true
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - not vault_sealed | bool
    - vault_bootstrap_root_token | length > 0

- name: Parse Vault audit devices
  ansible.builtin.set_fact:
    vault_audit_devices: "{{ vault_audit_list_raw.stdout | from_json }}"
    vault_file_audit_already_enabled: >-
      {{
        (
          vault_audit_list_raw.stdout | from_json | dict2items |
          selectattr('value.type', 'equalto', vault_bootstrap_audit_type) |
          selectattr('value.options.file_path', 'defined') |
          selectattr('value.options.file_path', 'equalto', vault_bootstrap_audit_file_path) |
          list | length
        ) > 0
      }}
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - not vault_sealed | bool
    - vault_bootstrap_root_token | length > 0

- name: Enable file audit device when not present
  ansible.builtin.command: >-
    {{ vault_bin_path }} audit enable
    -path={{ vault_bootstrap_audit_mount_path }}
    {{ vault_bootstrap_audit_type }}
    file_path={{ vault_bootstrap_audit_file_path }}
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
    VAULT_CACERT: "{{ vault_cacert }}"
    VAULT_TOKEN: "{{ vault_bootstrap_root_token }}"
  changed_when: true
  no_log: true
  when:
    - vault_bootstrap_enabled | bool
    - vault_bootstrap_enable_audit_device | bool
    - not vault_sealed | bool
    - vault_bootstrap_root_token | length > 0
    - not vault_file_audit_already_enabled | bool

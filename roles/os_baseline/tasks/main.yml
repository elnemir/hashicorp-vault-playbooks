- name: Validate supported platform family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == "RedHat"
    fail_msg: "Role os_baseline supports RedHat-compatible systems only."

- name: Update all system packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  when: os_baseline_full_update | bool

- name: Install baseline packages
  ansible.builtin.dnf:
    name: "{{ os_baseline_packages }}"
    state: present

- name: Configure NTP servers in chrony
  ansible.builtin.blockinfile:
    path: /etc/chrony.conf
    marker: "# {mark} MANAGED BY ANSIBLE"
    block: |
      {% for ntp_server in os_baseline_ntp_servers %}
      server {{ ntp_server }} iburst
      {% endfor %}
  notify: Restart chronyd
  when:
    - os_baseline_manage_ntp | bool
    - os_baseline_ntp_servers | length > 0

- name: Ensure SELinux target mode in config
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: "SELINUX={{ os_baseline_selinux_state }}"
  when: os_baseline_selinux_state in ["enforcing", "permissive", "disabled"]

- name: Ensure chronyd is enabled and running
  ansible.builtin.service:
    name: chronyd
    enabled: true
    state: started

- name: Ensure firewalld is enabled and running
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  when: os_baseline_manage_firewalld | bool

- name: Allow SSH only from approved CIDRs
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --permanent
      - "--add-rich-rule=rule family=ipv4 source address={{ item }} service name=ssh accept"
  loop: "{{ os_baseline_allowed_ssh_cidrs }}"
  register: firewalld_add_ssh_rules
  changed_when: "'success' in (firewalld_add_ssh_rules.stdout + firewalld_add_ssh_rules.stderr)"
  failed_when:
    - firewalld_add_ssh_rules.rc != 0
    - "'ALREADY_ENABLED' not in (firewalld_add_ssh_rules.stdout + firewalld_add_ssh_rules.stderr)"
  when:
    - os_baseline_manage_firewalld | bool
    - os_baseline_allowed_ssh_cidrs | length > 0
  notify: Reload firewalld

- name: Remove generic SSH service rule when strict SSH firewall is enabled
  ansible.builtin.command: firewall-cmd --permanent --remove-service=ssh
  register: firewalld_remove_ssh_service
  changed_when: "'success' in (firewalld_remove_ssh_service.stdout + firewalld_remove_ssh_service.stderr)"
  failed_when:
    - firewalld_remove_ssh_service.rc != 0
    - "'NOT_ENABLED' not in (firewalld_remove_ssh_service.stdout + firewalld_remove_ssh_service.stderr)"
  when:
    - os_baseline_manage_firewalld | bool
    - os_baseline_strict_ssh_firewall | bool
    - os_baseline_allowed_ssh_cidrs | length > 0
  notify: Reload firewalld
